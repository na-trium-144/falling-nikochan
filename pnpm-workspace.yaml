packages:
  - chart
  - i18n
  - frontend
  - route
  - worker

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: false
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: true

dedupePeers: true
minimumReleaseAge: 0

# change this to hoisted only when deploying to vercel
nodeLinker: isolated
