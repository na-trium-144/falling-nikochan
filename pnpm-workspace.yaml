packages:
  - chart
  - i18n
  - frontend
  - route
  - worker

allowBuilds:
  '@google/genai': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: false
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  # these are authored by me (@na-trium-144)
  - fn-commands
  - next-license-list

dedupePeers: true
verifyDepsBeforeRun: warn
catalogMode: strict
cleanupUnusedCatalogs: true

# change this to hoisted only when deploying to vercel
nodeLinker: isolated

catalog:
  react: ^19.2.6
  react-dom: ^19.2.6
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  next: 16.1.7
  eslint-config-next: 16.1.7
  "@next/mdx": 16.1.7
  "@next/bundle-analyzer": 16.1.7

  tailwindcss: ^4.2.2
  "@tailwindcss/postcss": ^4.2.2
  postcss: ^8.5.14
  
  "@sentry/hono": ^10.56.0
  "@sentry/browser": ^10.56.0
  "@sentry/nextjs": ^10.56.0

  "@icon-park/react": ^1.4.2
  "@icon-park/svg": ^1.4.2

  "@fontsource-variable/noto-sans": 5.2.5
  "@fontsource-variable/noto-sans-jp": 5.2.5
  "@fontsource/kaisei-opti": 5.2.5
  "@fontsource/merriweather": 5.2.5
  "@fontsource/noto-sans": 5.2.5
  "@fontsource/noto-sans-jp": 5.2.5

  hono: ^4.12.23
  hono-openapi: ^1.3.0
  mongodb: ^7.2.0
  "@msgpack/msgpack": ^3.1.3
  colorthief: ^3.3.1
  fn-commands: ^1.0.0
  isbot: ^5.1.40
  next-intl: ^4.12.0
  valibot: ^1.3.1
  wasmoon: ^1.16.0
  dotenv: ^16.6.1
  chai: ^6.2.2
  "@types/chai": ^5.2.3
  "@vercel/og": ^0.11.1
  "@gera2ld/tarjs": ^0.3.1
