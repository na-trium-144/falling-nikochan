packages:
  - chart
  - i18n
  - frontend
  - route
  - worker

allowBuilds:
  '@google/genai': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: false
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: true

catalog:
  "@gera2ld/tarjs": ^0.3.1
  "@hono/structured-logger": ^0.1.0
  "@msgpack/msgpack": ^3.1.3
  "@types/chai": ^5.2.3
  "@vercel/og": ^0.11.1
  chai: ^6.2.2
  colorthief: ^3.3.1
  dotenv: ^16.6.1
  fn-commands: ^1.0.0
  hono: ^4.12.23
  hono-openapi: ^1.3.0
  isbot: ^5.1.40
  mongodb: ^7.2.0
  next-intl: ^4.12.0
  postcss: ^8.5.17
  valibot: ^1.3.1
  wasmoon: ^1.16.0

# catalogMode: strict  # not working until v11.5.2 https://github.com/pnpm/pnpm/issues/11570

catalogs:
  # 複数パッケージでバージョンを合わせる必要があるものをグループ化する
  fontsource:
    "@fontsource-variable/noto-sans": 5.2.5
    "@fontsource-variable/noto-sans-jp": 5.2.5
    "@fontsource/kaisei-opti": 5.2.5
    "@fontsource/merriweather": 5.2.5
    "@fontsource/noto-sans": 5.2.5
    "@fontsource/noto-sans-jp": 5.2.5
  iconpark:
    "@icon-park/react": ^1.4.2
    "@icon-park/svg": ^1.4.2
  next:
    "@next/bundle-analyzer": 16.1.7
    "@next/mdx": 16.1.7
    eslint-config-next: 16.1.7
    next: 16.1.7
  react:
    "@types/react": ^19.2.14
    "@types/react-dom": ^19.2.3
    react: ^19.2.6
    react-dom: ^19.2.6
  sentry:
    "@sentry/browser": ^10.56.0
    "@sentry/hono": ^10.56.0
    "@sentry/nextjs": ^10.56.0
  tailwindcss:
    "@tailwindcss/postcss": ^4.3.2
    tailwindcss: ^4.3.2

cleanupUnusedCatalogs: true
dedupePeers: true

minimumReleaseAge: 1440
# minimumReleaseAgeStrict: true  # added in v11.0
minimumReleaseAgeExclude:
  # these are authored by me (@na-trium-144)
  - fn-commands
  - next-license-list

# change this to hoisted only when deploying to vercel
nodeLinker: isolated

strictDepBuilds: true

verifyDepsBeforeRun: warn
